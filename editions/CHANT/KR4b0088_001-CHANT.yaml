body:
  text: 卷一飲馬長城窟行飲馬長城窟水寒傷馬骨往謂長城吏慎莫稽留太原卒官作自有程舉築諧汝聲男兒寧當格鬭死何能怫鬱築長城長城何連連連連三千里邊城多健少內舍多寡婦作書與內舍便嫁莫留住善事新姑章時時念我故夫子報書往邊地君今出語一何鄙身在禍難中何為稽留他家子生男慎莫舉生女哺用脯君獨不見長城下死人骸骨相撐拄結髮行事君慊慊心意關明知邊地苦賤妾何能久自全玉臺新詠一樂府詩集三十八廣文選十三詩紀十六又書鈔百四十五作古樂府引脯一韻草堂詩箋十三新婚別注引婦故二韻遊覽二首高會時不娛羈客難為心慇懷從中發悲感激清音投觴罷歡坐逍遙步長林肅肅山谷風默默天路陰惆悵忘旋反歔欷涕沾襟類聚二十八廣文選九詩紀十六節運時氣舒秋風涼且清閒居心不娛駕言從友生翱翔戲長流逍遙登高城東望看疇野迴顧覽園庭嘉木凋綠葉芳草纖紅榮騁哉日月逝年命將西傾建功不及時鐘鼎何所銘收念還房寢慷慨詠墳經庶幾及君在立德垂功名類聚二十八廣文選九詩紀十六宴會凱風飄陰雲白日揚素暉良友招我遊高會宴中闈玄鶴浮清泉綺樹煥青蕤類聚三十九詩紀十六
