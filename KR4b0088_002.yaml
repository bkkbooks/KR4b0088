body:
  text: 卷二大暑賦土潤溽以歊蒸時淟涊以溷濁溫風鬱其彤彤譬炎火之燭燭初學記三料救藥之千百兮祗纍熱而增煩耀管靈之匪念兮將損性而傷神韻補一煩字注樂以忘憂氣變志遷爰速嘉賓式燕且殷韻補一遷字注止欲賦媛哉逸女在余東濱色曜春華豔過碩人乃遂古其寡儔固當世之無鄰允宜國而寧家實君子之攸嬪伊余情之是說志荒溢而傾移宵炯炯以不寐晝舍食而忘飢歎北風之好我美攜手之同歸忽日月之徐邁庶枯楊之生梯欲語言于玄鳥玄鳥逝以差池道悠長而路阻河廣漾而無梁雖企豫而欲往非一葦之可航展余轡以言歸含憯瘁而就床忽假暝其若寐夢所歡之來征魂翩翩以遙懷若交好而通靈藝文類聚十八惟今夕之何夕兮我獨無此良媒雲漢倬以昭回兮天水混而光流韻補二媒字注拂穹岫之瀟渤兮飛沙礫之濛濛玄龍戰於幽野兮昆蟲蟄而不藏韻補二濛字注武軍賦并序武軍賦并序回天軍于易水之陽以討瓚焉鴻溝參周鹿箛十里薦之以棘乃建修櫓干青霄竁深隧下三泉飛雲梯衝神鉤之具瑰異譎詭之奇不在孫吳之篇三略六韜之術者凡數十事祕莫得聞也乃作武軍賦曰赫赫哉烈烈矣于此武軍當天符之佐運承斗剛而曜震漢季世之不辟青龍紀乎大荒熊狼競以拏攫神寶播乎鎬京于是武臣赫然揚炎天之隆怒叫諸夏而號八荒爾乃擬北落而樹表晞壘壁以結營百校羅峙千部列陳彌方城掩平原於是啓明戒旦長庚告昏火烈具舉鼓角竝震整行案律決敵中原八部方置山布星陳法徑旆勇殿堅干戈森其若林牙旗翻以如繪千徒從唱億夫求和聲訇隱而動山光赫奕以燭夜其刃也則楚金越冶棠溪名工清堅皓鍔修刺鋭鋒陸陷蕊犀水截輕鴻鎧則東胡闕鞏百鍊精剛函師振椎韋人制縫玄羽縹甲灼爚流光弩則幽都筋角恆山檿幹通肌畼骨崇縕曲煙大黃沈紫朱繡別緣客機庭臂直矢輕弦當鋒摧決貫遐洞堅其弓則烏號越棘繁弱角端象弭繡質晢柎文身矢則申息肅慎箘簬空疏焦銅毒鐵簳鏃鳴鍭麗轂撻輈馬則飛雲絶景直鬐騧騮駁龍紫鹿文的𨆀魚走駿驚颷步象雲浮斂鞚則止受銜斯游鉤車轇轕九牛轉牽雷響電激折櫓倒垣其攻也則飛梯臨雲行閣虛溝上通紫電下過三墟蘊隆既備越有神鉤排雷衝則穨高雉烈炬然則頓名樓衝鉤競進熊虎爭先墮垣百疊敝樓數千炎燧四舉元戎齊登若乃清道整列按節徐行龍姿鳳歭灼有遺英南轅反旆爰整其旅胡馬駢足戎車齊軌藝文類聚五十九初學記二十二引三條御覽三百三十六又三百四十七又三百四十八三百五十又三百五十六三百五十八悵儼其特起旌鉞裴以焜矯矯虎旅執戟撫弓北堂書鈔一一七金春作簫管起靈鼓發雷鼓奏駭轟嘈囐蕩心悅耳野夷懾而陵觸前後不相須候北堂書鈔一一七一二一魚麗納舒鵝鶴翼分裔裔驍騎衛角守偏北堂書鈔一一七元戎先馳甲騎踵繼雷師震激虎夷電蹄燁若揚炎熛熛九蔽哧咤彭贔不可當禦北堂書鈔一一七猶猛虎之驅群羊衝風之飛枯葉北堂書鈔一一七緑沉之槍分門集注杜工部詩一零重遇何氏五首之四薛夢符注崇京魁而獨處表完壑而殞顛北堂書鈔一一八探封蛇於窮穴梟鯨桀而取巨北堂書鈔一一八神武賦并序建安十有二年大司空武平侯曹公東征烏丸六軍被介雲輜萬乘治兵易水次于北平可謂神武奕奕有征無戰者已夫窺巢穴者未可與論六合之廣游潢汙者又烏知滄海之深大人之量固非說者之所可識也藝文類聚五十九書鈔一百五十八佇盤桓以淹次乃申命而後征覲狄民之故土追大晉之遐蹤惡先縠之懲寇善魏絳之和戎受金石而弗伐蓋禮樂而思終陵九城而上濟起齊軌乎玉繩車軒轔于雷室騎浮厲乎雲宮暉曜連乎白日旗旐繼于電光旆既軼乎白狼殿未出乎盧龍威凌天地勢括十衝單鼓未伐虜已潰崩克俊馘首梟其魁雄爾乃總輯瓌珍茵氈幕幄攘瓔帶佩不飾雕琢華璫玉瑤金麟互鹿文貝紫瑛縹碧玄緑黼錦繢組罽毼皮服藝文類聚五十九神女賦漢三七之建安荊野蠢而作仇贊皇師以南假濟漢川之清流感詩人之攸歎想神女之來遊儀營魄于髣佛託嘉夢以通精望陽侯而瀇漾覩玄麗之軼靈文絳虯之奕奕鳴玉鸞之嚶嚶紆玄靈之鬢髢兮珥明月之雙瑱結金鑠之婀娜兮飛羽袿之翩翩答玉質于苕華擬豔姿于蕣榮深靈根而固蒂兮精氣育而命長感仲春之和節歎鳴雁之噰噰申握椒以貽豫請同宴乎奧房苟好樂之嘉合永絶世而獨昌既歎爾以豔采又說我之長期順乾坤以成性夫何若而有辭藝文類聚七十九大荒賦假龜筮以貞吉問神諗以休詳初學記二十鍾鼓協於肆夏兮步驟應乎采薺聲啾鎗以鯈忽兮入南端之紫闈韻補一薺字注華蓋建杠招遙樹旆攝提運杓文昌承魁韻補一旆字注建皇極以連衡兮命辰機而結紐陽幹曜於乾門兮陰氣服於地戶韻補三紐字注考律曆於鳳鳥兮問民事於五鳩傷典墳之圮墜兮關大聖之顯符韻補二符字注覽六五之咎休兮乃貧尼而富虎嗣反覆其若茲兮豈云行之臧否韻補三否字注廓寂寥而無人兮雖獨存兮何補追邃古之遐跡兮唯德音兮為不朽韻補三朽字注仰閬風之城樓兮縣圃邈以隆崇垂若華之景曜兮天門閌以高驤韻補二崇字注帝告我以至賾兮重訊我以童蒙義混合於宣尼兮理齊歸於文王韻補二蒙字注越洪寧之蕩蕩兮追玄漠之造化跨五三其無偶兮邈卓立而獨奇韻補一化字注懼蓍兆之有惑兮退齊思乎蘭房魂營營與神遇兮又診余以嘉夢韻補二夢字注過不死之靈域兮仍羽人之丹丘惟民生之每在兮佇盤桓以躊躇韻補一丘字注延年其可留兮何勤遠以苦躬紛吾情之駘蕩兮嗟有願而弗遑韻補二躬字注雖遊目於西極兮大道卷而未舒仍皇靈之攸舒兮爰稽余之所求韻補一求字注懿淳耀之明德兮願請閒於一隅溫風翕以陽烈兮赤水汨以涌溥韻補一溥字注天儻芒其無色兮地潰坼而裂崩心殷勤以伊感兮惄永思以增傷悵太息而攬涕兮乃揮雹而淚冰韻補二崩字及冰字注王父皤焉白首兮坐清零之爽堂塊獨處而無疇兮願揖子以為朋韻補二朋字注迷迭賦迷迭賦立碧莖之娜婀鋪綵條之蜿蟺下扶疏以布濩上綺錯而交紛匪荀方之可樂實來儀之麗間動容飾而發微穆斐斐以承顏藝文類聚八十一御覽九百八十二竭歡慶於夙夜兮雖幽翳而彌彰事罔隆而不殺兮亦無始而不終韻補二終字注馨香難久終必歇兮棄彼華英收厥實兮韻補五歇字注馬腦勒賦并序五官將得馬腦以為寶勒美其英采之光豔也使琳賦之北堂書鈔一百二十六御覽三百五十八託瑤溪之寶岸臨赤水之朱陂御覽八百八爾乃他山為錯荊和為理制為寶勒以御君子御覽三百五十八帝道匪康皇鑒元輔顧以多福康以碩寶韻補三寶字注四賓之䇞播以淳夏色奮丹鳥明照烈火韻補三夏字注督以鉤繩規模度擬雕琢其章爰發絢綵韻補三綵字注瑰姿瑋質紛葩艷逸英華內照景流外越韻補五越字注令月吉日天氣宴陽公子命駕敖宴從容韻補二容字注太上去華尚素朴兮所貴在人匪金玉兮初傷勿用俟慶雲兮遭時顯價冠世珍兮君子窮達亦時然兮韻補五朴字二雲字又珍字注柳賦偉姿逸態英豔妙奇緑條縹葉雜遝纖麗龍鱗鳳翼綺錯交施蔚曇曇其杳藹象翠蓋之葳蕤初學記二十八天機運旋夫何逝之速也文選二三潘嶽悼亡詩注有孤子之細柳獨么枰而剽殊隨枯木於爨側將並置于土灰韻補一灰字注救斯民之絶命擠山嶽之隕顛匪神武之勤恪幾踣斃之不振韻補二振字注文武方作大小率從旟旐藹藹干戈戚揚韻補二從字注穆穆天子亶聖聰兮德音允塞民所望兮宜肅嘉樹配甘棠兮韻補二聰字注鸚鵡賦咨乾坤之兆物萬品錯而殊形有逸姿之令鳥含嘉淑之哀聲抱振鷺之素質被翠羽之縹精藝文類聚九十一諫何進召外兵易稱即鹿無虞諺有掩目捕雀夫微物尚不可欺以得志況國之大事其可以詐立乎今將軍總皇威握兵要龍驤虎步高下在心此猶鼓洪爐燎毛髮耳但當速發雷霆行權立斷夫違經合道天人所順而反委釋利器更徵外助大兵聚會彊者為雄所謂倒持干戈授人以柄功必不成祇為亂階後漢何進傳答東阿王箋琳死罪死罪昨加恩辱命並示龜賦披覽粲然君侯體高世之才秉青萍干將之器拂鐘無聲應機立斷此乃天然異稟非鑽仰者所庶幾也音義既遠清辭妙句焱絶煥炳譬猶飛兔流星超山越海龍驥所不敢追況于駑馬可得齊足夫聽白雪之音觀緑水之節然後東野巴人蚩鄙益著載歡載笑欲罷不能謹韞櫝玩耽以為吟頌琳死罪死罪文選初學記二十八更公孫瓚與子書蓋聞在昔衰周之世僵尸流血以為不然豈意今日身當其衝袁氏之攻似若神鬼鼓角鳴于地中梯衝舞吾樓上日窮月踧無所聊賴汝當碎首于張燕速致輕騎到者當起烽火于北吾當從內出不然吾亡之後天下雖廣汝欲求安足之地其可得乎魏志公孫瓚傳注引典略云紹使陳琳更其書云云答張紘書自僕在河北與天下隔此閒率少于文章易為雄伯故使僕受此過差之談非其實也今景興在此足下與子布在彼所謂小巫見大巫神氣盡矣吳志張紘傳注引吳書為曹洪與魏太子書為曹洪與魏太子書十一月五日洪白前初破賊情奓意奢說事頗過其實得九月二十日書讀之喜笑把玩無厭亦欲令陳琳作報琳頃多事不能得為念欲遠以為歡故自竭老夫之思辭多不可一一粗舉大綱以當談笑漢中地形實有險固四嶽三塗皆不及也彼有精甲數萬臨高守要一人揮戟萬夫不得進而我軍過之若駭鯨之決細網奔兕之觸魯縞未足以喻其易雖云王者之師有征無戰不義而彊古人常有故唐虞之世蠻夷猾夏周宣之盛亦讎大邦詩書歎載言其難也斯皆憑阻恃遠故使其然是以察茲地勢謂為中才處之殆難倉卒來命陳彼妖惑之罪敘王師曠蕩之德豈不信然是夏殷所以喪苗扈所以斃我之所以克彼之所以敗也不然商周何以不敵哉昔鬼方聾昧崇虎讒凶殷辛暴虐三者皆下科也然高宗有三年之征文王有退修之軍盟津有再駕之役然後殪戎勝殷有此武功焉有星流景集飆奮霆擊長驅山河朝至暮捷若今者也由此觀之彼固不逮下愚則中才之守不然明矣在中才則謂不然而來示乃以為彼之惡稔雖有孫田墨氂猶無所救竊又疑焉何者古之用兵敵國雖亂尚有賢人則不伐也是故三仁未去武王還師宮奇在虞晉不加戎季梁猶在彊楚挫謀暨至衆賢奔絀三國為墟明其無道有人猶可救也且夫墨子之守縈帶為垣高不可登折箸為械堅不可入若乃距陽平據石門攄八陳之列騁奔牛之權焉肯土崩魚爛哉設令守無巧拙皆可攀附則公輸已陵宋城樂毅已拔即墨矣墨翟之術何稱田單之智何貴老夫不敏未之前聞蓋聞過高唐者效王豹之謳遊睢渙者學藻繪之綵閒自入益部仰司馬楊王遺風有子勝斐然之志故頗奮文辭異于他日怪乃輕其家丘謂為倩人是何言歟夫緑驥垂耳于坰牧鴻雀戢翼于汙池褻之者固以為園囿之凡鳥外廄之下乘也及整蘭筋揮徑翮陵厲清浮顧盼千里豈可謂其借翰于晨風假足于六駮哉恐猶未信丘言必大噱也洪白文選為袁紹檄豫州左將軍領豫州刺史郡國相守蓋聞明主圖危以制變忠臣慮難以立權是以有非常之人然後有非常之事有非常之事然後立非常之功夫非常者故非常人所擬也曩者彊秦弱主趙高執柄專制朝權威福由己時人迫脅莫敢正言終有望夷之敗祖宗焚滅汙辱至今永為世鑒及臻呂后季年産祿專政內兼二軍外統梁趙擅斷萬機決事省禁下凌上替海內寒心于是絳侯朱虛興兵奮怒誅夷逆暴尊立太宗故能王道興隆光明顯融此則大臣立權之明表也司空曹操祖父中常侍騰與左悺徐璜竝作妖孽叨餮放橫傷化虐民父嵩乞丐攜養因贓假位輿金輦璧輸貨權門竊盜鼎司傾覆重器操贅閹遺醜本無懿德僄狡鋒協好亂樂禍幕府董統鷹揚掃除凶逆續遇董卓侵官暴國于是提劍揮鼓發命東夏收羅英雄棄瑕取用故遂與操同咨合謀授以裨師謂其鷹犬之才爪牙可任至乃愚佻短略輕進易退傷夷折衄數喪師徒幕府輒復分兵命鋭修完補輯表行東郡太守領兗州刺史被以虎文授以偏師獎蹙威柄冀獲秦師一剋之報而操遂承資跋扈肆行凶忒割剝元元殘賢害善故九江太守邊讓英才俊偉天下知名直言正色論不阿諂身首被梟懸之誅妻孥受灰滅之咎自是士林憤痛民怨彌重一夫奮臂舉州同聲故躬破于徐方地奪于呂布倣徨東裔蹈據無所幕府惟彊幹弱枝之義且不登叛人之黨故復援旌擐甲席卷起征金鼓響振布衆奔沮拯其死亡之患復其方伯之位則幕府無德于兗土之民而有大造于操也後會鸞駕反旆群虜寇攻時冀州方有北鄙之警匪遑離局故使從事中郎徐勛就發遣操使繕修郊廟翊衛幼主操便放志專行脅遷當御省禁卑侮王室敗法亂紀坐領三臺專制朝政爵賞由心刑戮在口所愛光五宗所惡滅三族群談者受顯誅腹議者蒙隱戮百寮鉗口道路以目尚書記朝會公卿充員品而已故太尉楊彪典歷二司享國極位操因緣眥睚被以非罪榜楚參并五毒備至觸情任忒不顧憲網又議郎趙彥忠諫直言義有可納是以聖朝含聽改容加飾操欲迷奪時明杜絶言路擅收立殺不俟報聞又梁孝王先帝母昆墳陵尊顯桑梓松柏猶宜肅恭而操帥將吏士親臨發掘破棺裸尸掠取金寶至令聖朝流涕士民傷懷操又特置發丘中郎將摸金校尉所遇隳突無骸不露身處三公之位而行桀虜之態汙國虐民毒施人鬼加其細政苛慘科防互設罾繳充蹊坑穽塞路舉手挂網羅動足觸機陷是以兗豫有無聊之民帝都有吁嗟之怨歷觀載籍無道之臣貪殘酷烈于操為甚幕府方詰外姦未及整訓加緒含容冀可彌縫而操豺狼野心潛包禍謀乃欲摧撓棟梁孤弱漢室除滅忠正專為梟雄往者伐鼓北征公孫瓚彊寇桀逆拒圍一年操因其未破陰交書命外助王師內相掩襲故引兵造河方舟北濟會其行人發露瓚亦梟夷故使鋒芒挫縮厥圖不果爾乃大軍過蕩西山屠各左校皆束手奉質爭為前登犬羊殘醜消淪山谷于是操師震懾晨夜逋遁屯據敖倉阻河為固欲以螳蜋之斧禦隆車之隧幕府奉漢威靈折衝宇宙長戟百萬胡騎千群奮中黃育獲之士騁良弓徑弩之勢并州越太行青州涉濟漯大軍泛黃河而角其前荊州下宛葉而掎其後雷霆虎步並集虜庭若舉炎火以焫飛蓬覆滄海以沃熛炭有何不滅者哉又操軍吏士其可戰者皆出自幽冀或故營部曲咸怨曠思歸流涕北顧其餘兗豫之民及呂布張揚之遺衆覆亡迫脅權時苟從各被創痍人為讎敵若回旆方徂登高岡而擊鼓吹揚素揮以啓降路必土崩瓦解不俟血刃方今漢室陵遲綱維弛絶聖朝無一介之輔股肱無折衝之勢方畿之內簡練之臣皆垂頭搨翼莫所憑恃雖有忠義之佐脅于暴虐之臣焉能展其節又操持部曲精兵七百圍守宮闕外託宿衛內實拘執懼其篡逆之萌因斯而作此乃忠臣肝腦塗地之秋烈士立功之會可不勗哉操又矯命稱制遣使發兵恐邊遠州郡過聽而給與彊寇弱主違衆旅叛舉以喪名為天下笑則明哲不取也即日幽并青冀四州竝進書到荊州便勒見兵與建忠將軍協同聲勢州郡各整戎馬羅落境界舉師揚威竝匡社稷則非常之功于是乎著其得操首者封五千戶侯賞錢五千萬部曲偏裨將校諸吏降者勿有所問廣宣恩信班揚符賞布告天下威使知聖朝有拘逼之難如律令文選又見後漢袁紹傳又見魏志袁紹傳注引魏氏春秋竝有刪節檄吳將校部曲文年月朔日子尚書令彧告江東諸將校部曲及孫權宗親中外蓋聞禍福無門惟人所召夫見機而作不處凶危上聖之明也臨事制變困而能通智者之慮也漸漬荒沈往而不反下愚之蔽也是以大雅君子于安思危以遠咎悔小人臨禍懷佚以待死亡二者之量不亦殊乎孫權小子未辨菽麥要領不足以膏齊斧名字不足以汙簡墨譬猶鷇卵始生翰毛而便陸梁放肆顧行吠主謂為舟楫足以距皇威江湖可以逃靈誅不知天網設張以在綱目爨鑊之魚期于消爛也若使水而可恃則洞庭無三苗之墟子陽無荊門之敗朝鮮之壘不刊南越之旍不拔昔夫差承闔閭之遠跡用申胥之訓兵棲越會稽可謂彊矣及其抗衡上國與晉爭長都城屠于勾踐武卒散于黃池終于覆滅身罄越軍及吳王濞驕恣屈彊猖猾始亂自以兵彊國富勢陵京城太尉帥師甫下滎陽則七國之軍瓦解冰泮濞之罵言未絶于口而丹徒之刃已陷其胸何則天威不可當而悖逆之罪重也且江湖之衆不足恃也自董卓作亂以迄于今將三十載其間豪桀縱橫熊據虎跱彊如二袁勇如呂布跨州連郡有威有名十有餘輩其餘鋒捍特起鸇視狼顧爭為梟雄者不可勝數然皆伏鈇嬰鉞首腰分離雲散原燎罔有孑遺近者關中諸將復相合聚續為叛亂阻二華據河渭驅率羌胡齊鋒東向氣高志遠似若無敵丞相秉鉞鷹揚順風烈火元戎啓行未鼓而破伏尸千萬流血漂櫓此皆天下所共知也是後大軍所以臨江而不濟者以韓約馬超逋逸迸脫走還涼州復欲鳴吠逆賊宋建僭號河首同惡相救竝為脣齒又鎮南將軍張魯負固不恭皆我王誅所當先加故且觀兵旋旆復整六師長驅西征致天之誅偏將涉隴則建約梟夷旍首萬里軍入散關則群氐率服王侯豪帥奔走前驅進臨漢中則陽平不守十萬之師土崩魚爛張魯逋竄走入巴中懷恩悔過委質還降巴夷王朴胡賨邑侯杜濩各帥種落共舉巴郡以奉王職鉦鼓一動二方俱定利盡西海兵不鈍鋒若此之事皆上天威明社稷神武非徒人力所能立也聖朝寬仁覆載允信允文大啓爵命以示四方魯及胡濩皆享萬戶之封魯之五子各受千室之邑胡濩子弟部曲將校為列侯將軍已下千有餘人百姓安堵四民反業而建約支屬皆為鯨鯢超之妻孥焚首金城父母嬰孩覆尸許市非國家鍾禍于彼降福于此也順逆之分不得不然夫擊鳥先高攫鷙之勢也牧野之威孟津之退也今者枳棘翦扞戎夏以清萬里肅齊六師無事故大舉天師百萬之衆與胸奴南單于呼完廚及六郡烏桓丁令屠各湟中羌僰霆奮席卷自壽春而南又使征西將軍夏侯淵等率精甲五萬及武都氐羌巴漢鋭卒南臨汶江扼據庸蜀江夏襄陽諸軍橫截湘沅以臨豫章樓船橫海之師直指吳會萬里剋期五道並入權之期命於是至矣丞相銜奉國威為民除害元惡大憝必當梟夷至於枝附葉從皆非詔書所特禽疾故每破滅彊敵未嘗不務在先降後誅拔將取才各盡其用是以立功之士莫不翹足引領望風響應昔袁術僭逆王誅將加則盧江太守劉勳先舉其郡還歸國家呂布作亂師臨下邳張遼侯成率衆出降還討眭固薛洪樛尚開城就化官渡之役則張郃高奐舉事立功後討袁尚則都督將軍馬延故豫州刺史陰夔射聲校尉郭昭臨陳來降圍守鄴城則將軍蘇游反為內應審配兄子開門入兵既誅袁談則幽州大將焦觸攻逐袁熙舉縣來服凡此之輩數百人皆忠壯果烈有智有仁悉與丞相參圖畫策折衝討難芟敵搴旗靜安海內豈輕舉措也哉誠乃天啓其心計深慮遠審邪正之津明可否之分勇不虛死節不苟立屈身變化唯道所存故乃建丘山之功享不訾之祿朝為仇虜夕為上將所謂臨難知變轉禍為福者也若夫說誘甘言懷寶小惠泥滯苟且沒而不覺隨波漂流與熛俱滅者亦甚衆多吉凶得失豈不哀哉昔歲軍在漢中東西懸隔合肥遺守不滿五千權親以數萬之衆破敗奔走今乃欲當禦雷霆難以冀矣夫天道助順人道助信事上之謂義親親之謂仁盛孝章君也而權誅之孫輔兄也而權殺之賊義殘仁莫斯為甚乃神靈之逋罪下民所同讎辜讎之人謂之凶賊是故伊摯去夏不為傷德飛廉死紂不可謂賢何者去就之道各有宜也丞相深惟江東舊德名臣多在載籍近魏叔英秀出高峙著名海內虞文繡砥礪清節耽學好古周泰明當世雋彥德行修明皆宜膺受多福保乂子孫而周盛門戶無辜被戮遺類流離湮沒林莽言之可為愴然聞魏周榮虞仲翔各紹堂構能負析薪及吳諸顧陸舊族長者世有高位當報漢德顯祖揚名又諸將校孫權婚親皆我國家良寶利器而並見驅迮雨絶于天有斧無柯何以自濟相隨顛沒不亦哀乎蓋鳳鳴高岡以遠罻羅賢聖之德也鸋鴂之鳥巢于葦苕苕折子破下愚之惑也今江東之地無異葦苕諸賢處之信亦危矣聖朝開弘曠蕩重惜民命誅在一人與衆無忌故設非常之賞以待非常之功乃霸夫烈士奮命之良時也可不勉乎若能翻然大舉建立元勳以膺顯祿福之上也如其未能笇量大小以存易亡亦其次也夫係蹄在足則猛虎絶其蹯蝮蛇在手則壯士斷其節何則以其所全者重以其所棄者輕若乃樂禍懷寧迷而忘復暗大雅之所保背先賢之去就忽朝陽之安甘折苕之末日忘一日以至覆沒大兵一放玉石俱碎雖欲救之亦無及已故令往購募爵賞科條如左檄到詳思至言如詔律令文選又略見藝文類聚五十八應譏客有譏余者云聞君子動作周旋無所茍而已矣今主君鍾陰陽之美總賢聖之風固非世人所能及遭豺狼肆虐社稷隕傾既不能抗節服義與主存亡而背枉違難耀茲武功徒獨震撲山東剝落元元結疑本朝假拒群姦使己蒙噂沓之謗而他人受討賊之勳捐功棄力以德取怨今賤文德而貴武勇任權譎而背舊章無乃非至德之純美而有闕于後人哉主人曰是何言也夫兵之設亦久矣所以威不軌而懲淫慝也夫申鳴違父樂羊食子季友鴆兄周公戮弟猶忍而行之王事所不得已也而況將避讒慝之嫌棄社稷之難愛暫勞之民忘永康之樂此庸夫猶所不為何有冠世之士哉昔洪水滔天泛濫中國伯禹躬之過門而不入率萬方之民致力乎溝洫及至簫韶九成百獸率舞垂拱無為而天下晏如夫豈前好勤而後偷樂乎蓋以彼勞求斯逸也夫世治責人以禮世亂則考人以功斯各一時之宜故有論戰陳之權于清廟之堂者則狂矣陳俎豆之器于城濮之墟者則悖矣是以達人君子必相時以立功必揆宜以處事孝靈既喪妭官放禍棟臣殘酷宮室焚火主君乃芟凶族夷惡醜蕩滌朝姦清澄守職也既乃卓為封蛇幽鳩帝后強以暴國非力所討違而去之宜也是故天贊人和無思不至用能合師百萬若運諸掌者義也今主君以寬弘為宇仁義為廬若地之載如天之燾故當其聞管籥之聲則恐民之病也見羽旄之美則懼士之勞也察稼穡之不時則惟民之匱也臨臺觀之崇高則恤役之病也是以虛心恭己取人之謨闢四門廣諫路貴讜言賤巧僞慮不專行功不擅美咨事若不及求愆恐不聞用能使賢智者盡其策勇敢者竭其身故舉無遺闕而風烈宿宣也藝文類聚二十五治刃銷鋒偃武行德文選四六王融三月三日曲水詩序注韋端碑撰勒洪伐式昭德音文選七命注
