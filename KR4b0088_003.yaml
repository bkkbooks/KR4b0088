body:
  text: 附録失題詩春天潤九野卉木渙油油紅華紛曄曄發秀曜中衢韻補二衢字注又沈淪衆庶間與世無有殊紆鬱懷傷結舒展有何由韻補二殊字注又轗軻固宜然卑陋何所羞援茲自抑慰研精於道腴韻補二腴字注又仲尼以聖德行騁遍周流遭斥厄陳蔡歸之命也夫韻補二夫字注又二年江劍外九家集注杜詩二一建都十二韻師尹注為袁紹上漢帝書臣聞昔有哀歎而霜隕悲哭而崩城者每讀其書謂為信然於今況之乃知妄作何者臣出身為國破家立事至乃懷忠獲釁抱信見疑晝夜長吟剖肝泣血曾無崩城隕霜之應故鄒衍杞婦何能感徹臣以負薪之資拔於陪隸之中奉職憲臺擢授戎校常侍張讓等滔亂天常侵奪朝威賊害忠德扇動姦黨故大將軍何進忠國疾亂義心赫怒以臣頗有一介之節可責以鷹犬之功故授臣以督司咨臣以方略臣不敢畏憚強禦避禍求福與進合圖事無違異忠策未盡而元帥受敗太后被質宮室焚燒陛下聖德幼沖親遭厄困時進既被害師徒喪沮臣獨將家兵百餘人抽戈承明竦劍翼室虎叱群司奮擊凶醜曾不浹辰罪人斯殄此誠愚臣效命之一驗也會董卓乘虛所圖不軌臣父兄親從並當大位不憚一室之禍苟惟寧國之義故遂解節出奔創謀河外時卓方貪結外援招悅英豪故即臣勃海申以軍號則臣之與卓未有纖芥之嫌若使苟欲滑泥揚波偷榮求利則進可以享竊祿位退無門戶之患然臣愚所守志無傾奪故遂引會英雄興師百萬飲馬孟津歃血漳河會故冀州牧韓馥懷挾逆謀欲專權勢絶臣軍糧不得踵係至使猾慮肆毒害及一門尊卑大小同日并戮鳥獸之情猶知號呼臣所以蕩然忘哀貌無隱戚者誠以忠孝之節道不兩立顧私懷己不能全功斯亦愚臣破家徇國之二驗也又黃巾十萬焚燒青兗黑山張楊蹈藉冀域臣乃旋師奉辭伐畔金鼓未震狡敵知亡故韓馥懷懼謝咎歸土張楊黑山同時乞降臣時輒承制竊比竇融以議郎曹操權領兗州牧會公孫瓚師旅南馳陸掠北境臣即星駕席卷與瓚交鋒假天之威每戰輒克臣備公族子弟生長京輦頗聞俎豆不習干戈加自乃祖先臣以來世作輔弼咸以文德盡忠得免罪戾臣非與瓚角戎馬之勢爭戰陳之功者也誠以賊臣不誅春秋所貶苟云利國專之不疑故冒踐霜雪不憚劬勤實庶一捷之福以立終身之功社稷未定臣誠恥之太僕趙岐銜命來征宣明陛下含弘之施蠲除細故與下更新奉詔之日引師南轅是臣畏怖天威不敢怠慢之三驗也又臣所上將校率皆清英宿德令名顯達登鋒履刃死者過半勤恪之功不見書列而州郡牧守競盜聲名懷持二端優游顧望皆列土錫圭跨州連郡是以遠近狐疑議論紛錯者也臣聞守文之世德高者位尊倉卒之時功多者賞厚陛下播越非所洛邑乏祀海內傷心志士憤惋是以忠臣肝腦塗地肌膚橫分而無悔心者義之所感故也今賞加無勞以攜有德杜黜忠功以疑衆望斯所豈腹心之遠圖將乃讒慝之邪說使之然也臣爵為通侯位二千石殊恩厚德臣既叨之豈敢窺覬重禮以希彤弓玈矢之命哉誠傷偏裨列校勤不見紀盡忠為國翻成重愆斯蒙恬所以悲號於邊獄白起歔欷於杜郵也太傅日磾位為師保任配東征而耗亂王命寵任非所凡所舉用皆衆所損棄而容納其策以為謀主令臣骨肉兄弟還為讎敵交鋒接刃搆難滋甚臣雖欲釋甲投戈事不得已誠恐陛下日月之明有所不照四聰之聽有所不聞乞下臣章咨之群賢使三槐九棘議臣罪戾若以臣今行權為釁則桓文當有誅絶之刑若以衆不討賊為賢則趙盾可無書弒之貶矣臣雖小人志守一介若使得申明本心不愧先帝則伏首歐刀褰衣就鑊臣之願也惟陛下垂尸鳩之平絶邪諂之論無令愚臣結恨三泉後漢書袁紹傳與公孫瓚書孤與足下既有前盟舊要申之以討亂之誓愛過夷叔分著丹青謂為旅力同軌足踵齊晉故解印釋紱以北帶南分割膏腴以奉執事此非孤赤情之明驗邪豈寤足下棄烈士之高義尋禍亡之險蹤輟而改慮以好易怨盜遣士馬犯暴豫州始聞甲卒在南親臨戰陳懼于飛矢迸流狂刃橫集以重足下之禍徒增孤之咎釁也故為薦書懇惻冀可改悔而足下超然自逸矜其威詐謂天罔可吞豪雄可滅果令貴弟殞于鋒刃之端斯言猶在於耳而足下曾不尋討禍源克心罪己苟欲逞其無疆之怒不顧逆順之津匿怨害民聘於余躬遂躍馬控弦處我疆土毒遍生民辜延白骨孤辭不獲已以登界橋之役是時足下兵氣霆震駿馬電發僕師徒肇合機械不嚴彊弱殊科衆寡異論假天之助小戰大克遂陵躡奔背因壘館穀此非天威棐諶福豐有禮之符表乎足下志猶未厭乃復糾合餘燼率我蛑賊以焚爇勃海孤又不獲寧用及龍河之師羸兵前誘大軍未濟而足下膽破衆散不鼓而敗兵衆擾亂君臣並奔此又足下之為非孤之咎也自此以後禍隙彌深孤之師旅不勝其忿遂至積尸為京頭顱滿野愍彼無辜未嘗不慨然失涕也後比得足下書辭意婉約有改往修來之言僕既欣於舊好克復且愍兆民之不寧每輒引師南駕以順簡書弗盈一時而北邊羽檄之文未嘗不至孤是用痛心疾首靡所錯情夫處三軍之帥當列將之任宜令怒如嚴霜喜如時雨臧否好惡坦然可觀而足下二三其德彊弱易謀急則曲躬緩則放逸行無定端言無質要為壯士者固若此乎既乃殘殺老弱幽土憤怨衆叛親離孑然無黨又烏丸濊貊皆足下同州僕與之殊俗各奮迅激怒爭為鋒鋭又東西鮮卑舉踵來附此非孤德所能招乃足下驅而致之也夫當荒危之世處干戈之險內違同盟之誓外失戎狄之心兵興州壤禍發蕭牆將以定霸不亦難乎前以西山陸梁出兵平討會麴義餘殘畏誅逃命故遂住大軍分兵撲蕩此兵孤之前行乃界橋搴旗拔壘先登制敵者也始聞足下鐫金紆紫命以元帥謂當因茲奮發以報孟明之恥是故戰夫引領竦望旌旆怪遂含光匿影寂爾無聞卒臻屠滅相為惜之夫有平天下之怒希長世之功權御師徒帶養戎馬叛者無討服者不收威懷並喪何以立名今舊京克復天罔云補罪人斯亡忠幹翼化華夏儼然望於穆之作將戢干戈放散牛馬足下獨何守區區之土保軍內之廣甘惡名以速朽亡令德之久長壯而籌之非良策也宜釋憾除嫌敦我舊好若斯言之玷皇天是聞魏志公孫瓚傳注引漢晉春秋拜烏丸三王為單于版文使持節大將軍督幽青并領冀州牧阮鄉侯紹承制詔遼東屬國率衆王頒下烏丸遼西率衆王踏頓右北平率衆王汗盧維乃祖慕義遷善款塞內附北捍玁狁東拒濊貊世守北陲為百姓保障雖時侵犯王略命將徂征厥罪率不旋時悔愆變改方之外夷最又聰惠者也始有千夫長百夫長以相統領用能悉乃心克有勳力於國家稍受王侯之命自我王室多故公孫瓚作難殘夷厥土之君以侮天慢主是以四海之內並執干戈以衛社稷三王奮氣裔土忿姦憂國控弦與漢兵為表裏誠甚忠孝朝所嘉焉然而虎兕長蛇相隨塞路王官爵命否而無聞夫有勳不賞俾勤者怠今遣行謁者楊林齎單于璽綬車服以對爾勞其各綏靜部落教以謹慎無使作凶作慝世復爾祀位長為百蠻長厥有咎有不臧者泯於爾祿而喪於乃庸可不勉乎烏桓單于都護部衆左右單于受其節度他如故事魏志烏丸傳注引英雄記車渠碗賦廉而不劌婉而成章德兼聖哲行應中庸韻補二庸字注玉爵不揮欲厥珍兮豈若陶梓為用便兮指今棄寶與齊民兮韻補一便字注悼龜賦探賾索隱無幽不闡下方太祇上配清純韻補一闡字注山節藻梲既櫝且韞參千鎰而不賈兮豈十朋之所云通生死以為量兮夫何人之足怨韻補一韞字并怨字注失題檄二則單于震駭交臂受事屈膝請和海録碎事一零上引陳孔璋檄蛇虺顏氏家訓文章篇答客難六合咸熙九州來同倒載干戈放馬華陽韻補卷同字注太王築室百堵俱作西伯營臺功不浹日韻補五作字注
